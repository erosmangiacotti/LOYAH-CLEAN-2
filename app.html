<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOYAH - Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#faf8ff;color:#1a1a2e}
.header{background:white;padding:16px 24px;border-bottom:1px solid #ede6ff;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;color:#b18aff}
.main{max-width:900px;margin:40px auto;padding:0 24px}
.card{background:white;border:1px solid #ede6ff;border-radius:20px;padding:32px;margin-bottom:24px}
h1{font-family:Georgia,serif;font-size:32px;margin-bottom:8px}
.subtitle{color:#5b5b7a;margin-bottom:24px}
textarea{width:100%;min-height:120px;padding:16px;border:1px solid #e5e0f0;border-radius:12px;font-family:inherit;font-size:15px;resize:vertical}
.btn{background:#b18aff;color:white;border:none;padding:14px 28px;border-radius:12px;font-weight:600;cursor:pointer;margin-top:12px}
.btn:hover{opacity:0.9}
.result{margin-top:24px;padding:20px;background:#f7f3ff;border-radius:12px;display:none}
.badge{display:inline-block;background:#fde2f0;color:#a14d7a;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;margin-bottom:12px}
.pattern{font-size:18px;font-weight:600;margin:12px 0}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 21s-6.5-4.3-9.5-8.2C-0.5 9 2 4.5 6 4.5c2 0 3.5 1 4.5 2.2C11.5 5.5 13 4.5 15 4.5c4 0 6.5 4.5 3.5 8.3C18.5 16.7 12 21 12 21z" fill="#b18aff"/></svg> LOYAH</div>
  <div style="color:#5b5b7a">Ciao Giulia</div>
</div>
<div class="main">
  <div class="card">
    <h1>Nuova Analisi</h1>
    <p class="subtitle">Incolla un messaggio o descrivi la situazione</p>
    <textarea id="input" placeholder="Es: Marco: 'vediamo più avanti' ma poi non risponde per 2 giorni..."></textarea>
    <button class="btn" onclick="analyze()">Analizza</button>
    <div id="result" class="result">
      <span class="badge">LOYAH Analysis</span>
      <div class="pattern" id="pattern"></div>
      <div id="advice" style="color:#5b5b7a;line-height:1.6"></div>
    </div>
  </div>
</div>
<script>
async function analyze(){
  const text = document.getElementById('input').value;
  if(!text) return;
  const btn = document.querySelector('.btn');
  btn.textContent = 'Analizzo...';
  btn.disabled = true;
  try{
    const res = await fetch('/api/analyze', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text, user_id:'giulia'})
    });
    const data = await res.json();
    document.getElementById('pattern').textContent = 'Pattern: ' + (data.pattern || 'evitamento soft');
    document.getElementById('advice').innerHTML = '<strong>Consiglio:</strong> ' + (data.advice || 'Osserva la coerenza tra parole e azioni per 7 giorni.');
    document.getElementById('result').style.display = 'block';
  }catch(e){
    document.getElementById('pattern').textContent = 'Pattern: evitamento soft';
    document.getElementById('advice').innerHTML = '<strong>Consiglio:</strong> Demo mode - aggiungi le API keys su Vercel per attivare l'AI.';
    document.getElementById('result').style.display = 'block';
  }
  btn.textContent = 'Analizza';
  btn.disabled = false;
}
</script>
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
